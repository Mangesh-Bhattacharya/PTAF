# Example MITRE ATT&CK technique reference table.
#
# This is a small, illustrative subset (not exhaustive) used to give
# offensive-module stubs a real technique ID to map to. See
# https://attack.mitre.org for the authoritative, complete matrix.
#
# Each entry only records public reference metadata (ID / name / tactic /
# a one-line description of the technique). It does not contain any
# executable attack logic.

techniques:
  - id: T1566
    name: Phishing
    tactic: Initial Access
    description: >
      Adversaries send phishing messages to gain access to victim systems.

  - id: T1078
    name: Valid Accounts
    tactic: Defense Evasion, Persistence, Privilege Escalation, Initial Access
    description: >
      Adversaries obtain and abuse credentials of existing accounts.

  - id: T1110
    name: Brute Force
    tactic: Credential Access
    description: >
      Adversaries use brute force techniques to gain access to accounts.

  - id: T1021
    name: Remote Services
    tactic: Lateral Movement
    description: >
      Adversaries use valid accounts to log into services accessible
      remotely.

  - id: T1087
    name: Account Discovery
    tactic: Discovery
    description: >
      Adversaries attempt to get a listing of valid accounts on a system
      or within an environment.

  - id: T1526
    name: Cloud Service Discovery
    tactic: Discovery
    description: >
      Adversaries enumerate cloud services (e.g. IAM roles/policies) to
      identify misconfigurations or overly permissive access.

  - id: T1583
    name: Acquire Infrastructure
    tactic: Resource Development
    description: >
      Adversaries acquire infrastructure to support their operations,
      referenced here for attack-path planning/visualization context only.
