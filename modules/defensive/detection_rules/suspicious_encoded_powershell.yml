title: Suspicious Encoded PowerShell Command
id: 8e1c6e3a-0a1b-4b7a-9b7a-example00001
status: experimental
description: >
  Detects PowerShell being invoked with an encoded command argument, a
  technique commonly used to obscure command-line activity from casual
  inspection and simple string-based logging. Maps to MITRE ATT&CK
  T1059.001 (Command and Scripting Interpreter: PowerShell) and T1027
  (Obfuscated Files or Information).
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
author: PTAF (example rule, adapt before production use)
date: 2026/07/07
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\\powershell.exe'
      - '\\pwsh.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-e '
  filter_signed_internal_tooling:
    # Example placeholder: extend this with your own known-good signers /
    # paths so internal automation doesn't create constant noise.
    CommandLine|contains: 'PTAF-INTERNAL-ALLOW'
  condition: selection and not filter_signed_internal_tooling
falsepositives:
  - Legitimate admin scripts and deployment tooling that pass base64
    encoded commands to PowerShell. Tune the filter above for your
    environment before enabling in blocking mode.
level: medium
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1059.001
  - attack.t1027
