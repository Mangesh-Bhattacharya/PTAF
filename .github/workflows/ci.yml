name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-scan:
    name: Lint, format check, and security scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black bandit pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint (flake8)
        run: flake8 modules tests --max-line-length=100 --extend-ignore=E203 || true

      - name: Format check (black)
        run: black --check modules tests || true

      - name: Security scan (bandit)
        run: bandit -r modules -ll || true

      - name: Validate Sigma / YAML rule syntax
        run: |
          python - <<'PY'
          import pathlib, sys, yaml

          failed = False
          for path in pathlib.Path("modules/defensive/detection_rules").rglob("*.yml"):
              try:
                  yaml.safe_load(path.read_text())
                  print(f"OK: {path}")
              except Exception as exc:
                  print(f"FAILED to parse {path}: {exc}")
                  failed = True
          if failed:
              sys.exit(1)
          PY

  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: pytest -v
